<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LLM Safety Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="title-row">
      <h2>🛡️ LLM Safety</h2>
      <label class="switch">
        <input type="checkbox" id="master-toggle" checked>
        <span class="slider round"></span>
      </label>
    </div>
    <div id="status-banner" class="status-banner">Loading...</div>
  </div>

  <div class="section">
    <h3>Sensitivity Tuning</h3>
    <p class="desc">Adjust how aggressively the AI scans for toxic content.</p>
    <div class="radio-group">
      <label class="radio-container">
        <input type="radio" name="sensitivity" value="strict">
        <span class="radio-btn">Strict</span>
      </label>
      <label class="radio-container">
        <input type="radio" name="sensitivity" value="balanced" checked>
        <span class="radio-btn">Balanced</span>
      </label>
      <label class="radio-container">
        <input type="radio" name="sensitivity" value="relaxed">
        <span class="radio-btn">Relaxed</span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="title-row">
      <h3>PII Detection</h3>
      <label class="switch">
        <input type="checkbox" id="pii-toggle" checked>
        <span class="slider round"></span>
      </label>
    </div>
    <p class="desc">Instantly block SSNs, Credit Cards, and warn on Emails/Phones.</p>
  </div>

  <div class="section">
    <h3>Trusted Whitelist</h3>
    <p class="desc">Disable scanning entirely on specific domains (e.g., internal tools).</p>
    <div class="whitelist-input-row">
      <input type="text" id="whitelist-input" placeholder="e.g. corp-tool.com">
      <button id="add-whitelist-btn">Add</button>
    </div>
    <ul id="whitelist-ul" class="whitelist-list">
      <!-- items added via js -->
    </ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
